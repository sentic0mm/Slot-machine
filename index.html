<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gamblen ist toll</title>

<link rel="manifest" href="manifest.json">

<style>
   
body {
    margin: 0;
    background: #1b1b1b;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    display: flex;
    min-height: 100vh;
}

.left {
    width: 180px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}

#lever {
    width: 120px;
    height: 260px;
    font-size: 26px;
    cursor: pointer;
    border: none;
    border-radius: 15px;
    background: #444;
    color: white;
    transition: transform .25s;
}

.lever-pulled {
    transform: rotate(25deg);
}

.right {
    flex: 1;
    padding: 30px;
}

.money {
    font-size: 38px;
    margin-bottom: 20px;
}

.reels {
    display: flex;
    gap: 20px;
    margin: 30px 0;
}

.reel {
    width: 130px;
    height: 130px;
    background: white;
    color: black;
    font-size: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 15px;
    box-shadow: 0 0 15px #000;
}

.status {
    font-size: 28px;
    min-height: 40px;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 15px;
}

input {
    width: 200px;
    padding: 10px;
    font-size: 18px;
}

.buttons {
    margin-top: 25px;
}

.buttons button {
    padding: 12px 20px;
    font-size: 18px;
    margin-right: 10px;
    cursor: pointer;
}

.win { color: #00ff66; }
.lose { color: #ff5555; }
.jackpot { color: gold; }
</style>
</head>

<body>

<button id="btnRefresh">refresh moneten</button>

<div class="container">

    <div class="left">
        <button id="lever">
            🔴<br>│<br>│<br>│<br>■■■
        </button>
    </div>

    <div class="right">

        <div class="money" id="money">Geld: 10.00$</div>

        <div class="reels">
            <div class="reel" id="r1">🍒</div>
            <div class="reel" id="r2">🍋</div>
            <div class="reel" id="r3">⭐</div>
        </div>

        <div class="status" id="status">Hebel ziehen!</div>

        <label>Einsatz</label>
        <input id="bet" type="number" value="1" min="1">

        <label>Anzahl Spins</label>
        <input id="spinCount" type="number" value="1" min="1">

        <div class="buttons">
            <button id="btnAllIn">ALL IN</button>
            <button id="btnCashOut">CASH OUT</button>
        </div>

    </div>
</div>

<script>
   
const symbols = ["🍒","🍋","⭐","🔔","7️⃣","💎"];

let money = 10;
let spinning = false;

const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");
const r3 = document.getElementById("r3");
const statusBox = document.getElementById("status");

function updateMoney() {
    document.getElementById("money").innerText =
        "Geld: " + money.toFixed(2) + "$";
}

function randomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function spinReel(reel, duration) {
    return new Promise(resolve => {
        let interval = setInterval(() => {
            reel.innerText = randomSymbol();
        }, 80);

        setTimeout(() => {
            clearInterval(interval);
            const final = randomSymbol();
            reel.innerText = final;
            resolve(final);
        }, duration);
    });
}

async function startSpin() {
    if (spinning) return;

    let bet = parseFloat(document.getElementById("bet").value);
    let spins = parseInt(document.getElementById("spinCount").value);

    if (isNaN(bet) || isNaN(spins)) return;
    if (money < bet) {
        statusBox.innerText = "Kein Geld mehr!";
        return;
    }

    spinning = true;

    const lever = document.getElementById("lever");
    lever.classList.add("lever-pulled");
    setTimeout(() => lever.classList.remove("lever-pulled"), 250);

    for (let i = 0; i < spins; i++) {

        money -= bet;
        updateMoney();

        statusBox.innerText = "🎰 Dreht...";

        const a = await spinReel(r1, 1200);
        const b = await spinReel(r2, 1800);
        const c = await spinReel(r3, 2200);

        let win = 0;

        if (a === b && b === c) {
            win = bet * 10;
            statusBox.className = "status jackpot";
            statusBox.innerText = "🎰 JACKPOT +" + win.toFixed(2) + "$";
        }
        else if (a === b || b === c || a === c) {
            win = bet * 2;
            statusBox.className = "status win";
            statusBox.innerText = "✅ Gewonnen +" + win.toFixed(2) + "$";
        }
        else {
            statusBox.className = "status lose";
            statusBox.innerText = "❌ Verloren";
        }

        money += win;
        updateMoney();

        await new Promise(r => setTimeout(r, 500));
    }

    spinning = false;
}

document.getElementById("lever").addEventListener("click", startSpin);

document.getElementById("btnRefresh").addEventListener("click", () => {
    location.reload();
});

document.getElementById("btnAllIn").addEventListener("click", () => {
    document.getElementById("bet").value = Math.max(1, Math.floor(money));
});

document.getElementById("btnCashOut").addEventListener("click", () => {
    statusBox.className = "status";
    statusBox.innerText = "Ausgezahlt: " + money.toFixed(2) + "$";
});

updateMoney();

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
